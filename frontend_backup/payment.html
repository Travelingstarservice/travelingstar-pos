<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TravelingStar POS - Cash App Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1, h2 { text-align: center; }
    label { font-weight: bold; }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0 15px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #00c244;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background-color: #009d34; }
    .qr-container {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>TravelingStar POS</h1>
  <h2>Select Service & Pay via Cash App</h2>

  <label for="service">Select Service:</label>
  <select id="service" onchange="updateAmount()">
    <option value="">-- Select a service --</option>
    <option value="20">Haircut - $20</option>
    <option value="15">Manicure - $15</option>
    <option value="50">Massage - $50</option>
  </select>

  <label>Amount ($):</label>
  <input type="text" id="amount" readonly />

  <button onclick="payWithCashApp()">Pay with Cash App</button>

  <div class="qr-container">
    <img id="cash-qr" src="" alt="Cash App QR Code" width="200" />
  </div>

  <script>
    const cashTag = "TravelingSS";

    function updateAmount() {
      const serviceSelect = document.getElementById('service');
      const amountInput = document.getElementById('amount');
      amountInput.value = serviceSelect.value;

      // Update QR code dynamically
      const qr = document.getElementById('cash-qr');
      if (serviceSelect.value) {
        qr.src = `https://api.qrserver.com/v1/create-qr-code/?data=https://cash.app/$${cashTag}/${serviceSelect.value}&size=200x200`;
      } else {
        qr.src = '';
      }
    }

    function payWithCashApp() {
      const amount = document.getElementById('amount').value;
      if (!amount) { alert('Please select a service'); return; }
      const url = `https://cash.app/$${cashTag}/${amount}`;
      window.open(url, "_blank");
    }
  </script>
</body>
</html>
}
