<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traveling Star POS</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-qr-code@2.0.6/lib/index.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;
const API_URL = "https://travelingstar-pos.onrender.com";

function App() {
  const [products, setProducts] = useState([]);
  const [customers, setCustomers] = useState([]);

  useEffect(() => {
    fetch(`${API_URL}/products`)
      .then(res => res.json())
      .then(data => setProducts(data))
      .catch(err => console.error(err));

    fetch(`${API_URL}/customers`)
      .then(res => res.json())
      .then(data => setCustomers(data))
      .catch(err => console.error(err));
  }, []);

  const handleBuy = (product) => {
    alert(`Buy Now clicked for ${product.name} — $${product.price}`);
    // Replace alert with CashApp/Stripe link later
  };

  return (
    <div style={{ padding: "20px", fontFamily: "Arial" }}>
      <h1>Products / Services</h1>
      <ul>
        {products.map(p => (
          <li key={p.id} style={{ marginBottom: "20px" }}>
            {p.name} — ${p.price}
            <button onClick={() => handleBuy(p)} style={{ marginLeft: "10px" }}>
              Buy Now
            </button>
            <div style={{ marginTop: "10px" }}>
              <QRCode value={`Buy ${p.name} for $${p.price}`} size={128} />
            </div>
          </li>
        ))}
      </ul>

      <h1>Customers</h1>
      <ul>
        {customers.map(c => (
          <li key={c.id}>{c.name} — {c.email}</li>
        ))}
      </ul>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

</script>
</body>
</html>
