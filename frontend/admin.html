<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Traveling Star - Admin Office</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:40px}
.card{background:#fff;padding:30px;border-radius:10px;max-width:800px;margin:auto}
button{padding:10px 15px;border:none;border-radius:6px;background:#007bff;color:#fff;cursor:pointer}
pre{background:#eee;padding:15px;border-radius:6px;white-space:pre-wrap}
</style>
</head>
<body>

<div class="card">
<h1>Traveling Star - Admin Office</h1>
<button onclick="loadLog()">Refresh Service Log</button>
<pre id="log">No service activity yet.</pre>
</div>

<script>
function loadLog(){
  fetch('/get-log')
    .then(r => r.json())
    .then(data => {
      document.getElementById('log').textContent=data.length?data.join('\n'):'No service activity yet.';
    })
    .catch(()=>{document.getElementById('log').textContent='Backend server is not running.';});
}
loadLog();
</script>

</body>
</html>
