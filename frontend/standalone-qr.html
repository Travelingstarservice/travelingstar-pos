<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Traveling Star Payment QR</title>
<style>
body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f5f5f5;font-family:sans-serif;}
.qr-container{text-align:center;background:#fff;padding:30px;border-radius:15px;box-shadow:0 6px 15px rgba(0,0,0,0.1);}
.qr-container img{max-width:300px;}
.qr-container p{margin-top:15px;font-size:1.2rem;font-weight:bold;color:#222;}
</style>
</head>
<body>
<div class="qr-container">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://cash.app/$TravelingSS" alt="Traveling Star Payment QR"/>
<p>Scan to Pay Traveling Star</p>
</div>
</body>
</html>
